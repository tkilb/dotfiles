# Syncer Configuration File
# This file specifies which repositories to synchronize and their schedule

# Default cron schedule (used if repository doesn't specify its own)
# Format: minute hour day month weekday

# MACHINE references:
#   linux-book | linux-box | pi-server | steam-deck | work-book

- path: ~/.config/alfred
  origin: git@github.com:tkilb/alfred.git
  cron: "0 17 * * *" # Every day at 5 PM
  machines:
    - work-book

- path: ~/.config/dotfiles-work
  cron: "0 17 * * *" # Every day at 5 PM
  machines:
    - work-book

- path: ~/.dotfiles
  origin: git@github.com:tkilb/dotfiles.git
  cron: "0 17 * * *" # Every day at 5 PM
  machines:
    - linux-book
    - linux-box
    - steam-deck
    - work-book

- path: ~/Notes/nvim
  origin: git@github.com:tkilb/notes-nvim.git
  cron: "0 * * * *" # Every hour
  machines:
    - linux-book
    - linux-box
    - work-book

- path: ~/Notes/personal
  origin: git@github.com:tkilb/notes-personal.git
  cron: "*/5 * * * *" # Every 5 minutes
  machines:
    - linux-book
    - linux-box
    - steam-deck
    - work-book

- path: ~/Notes/tech
  origin: git@github.com:tkilb/notes-tech.git
  cron: "0 * * * *" # Every hour
  machines:
    - linux-book
    - linux-box
    - work-book

- path: ~/Notes/work
  cron: "0 17 * * *" # Every day at 5 PM
  machines:
    - work-book

  path: ~/Programs/molten-driver
  origin: git@github.com:tkilb/molten-driver.git
  cron: "0 19 * * *" # Every day at 7 PM
  machines:
    - linux-box

  path: ~/Programs/molten-gamepad
  origin: git@github.com:tkilb/molten-driver.git
  cron: "0 19 * * *" # Every day at 7 PM
  machines:
    - linux-box

- path: ~/Programs/spotify-cli
  origin: git@github.com:tylerkilburn/spotify-cli.git 
  cron: "0 19 * * *" # Every day at 7 PM
  machines:
    - linux-box

