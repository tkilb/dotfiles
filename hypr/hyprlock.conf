# Hyprlock configuration

background {
    monitor = 
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor = 
    size = 200, 50
    position = 0, -80
    halign = center
    valign = center
    outer_color = rgb(179, 192, 203)
    inner_color = rgb(30, 30, 46)
    font_color = rgb(205, 214, 244)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = rgb(166, 227, 161)
    fail_color = rgb(243, 139, 168)
}

label {
    monitor = 
    text = Hello, $USER
    color = rgb(205, 214, 244)
    font_size = 20
    font_family = Sans
    position = 0, -150
    halign = center
    valign = center
}
