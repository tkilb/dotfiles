# Hypridle configuration

general {
    # Lock screen before sleep
    lock_before_sleep = true

    # Ignore DBus inhibition (e.g., from video players)
    ignore_dbus_inhibit = false

    # Log level (0=error, 1=warn, 2=info, 3=debug)
    log_level = 2
}

# ============================================
# AC Power (plugged in)
# ============================================

listener {
    # Screen off: 5 minutes
    timeout = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
    condition = on-ac
}

listener {
    # Lock screen: 15 minutes
    timeout = 900
    on-timeout = hyprlock
    condition = on-ac
}

listener {
    # Suspend: 30 minutes
    timeout = 1800
    on-timeout = systemctl suspend
    condition = on-ac
}

# ============================================
# Battery Power (unplugged) - more aggressive to save power
# ============================================

listener {
    # Screen off: 2 minutes
    timeout = 120
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
    condition = on-battery
}

listener {
    # Lock screen: 5 minutes
    timeout = 300
    on-timeout = hyprlock
    condition = on-battery
}

listener {
    # Suspend: 15 minutes
    timeout = 900
    on-timeout = systemctl suspend
    condition = on-battery
}
