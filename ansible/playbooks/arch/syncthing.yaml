---
- name: Install and Configure Syncthing
  hosts: localhost
  become: false
  vars:
    username: "{{ lookup('env', 'USERNAME') }}"

  tasks:
    - name: Install Syncthing
      become: true
      community.general.pacman:
        name: syncthing
        state: present
        update_cache: true

    - name: Enable and start Syncthing user service
      ansible.builtin.systemd:
        name: syncthing
        enabled: true
        state: started
        scope: user
        daemon_reload: true
