---
- name: Install NVIDIA Drivers for RTX 3080 (Wayland/Hyprland)
  hosts: localhost
  become: true

  vars:
    nvidia_packages:
      - nvidia-dkms
      - nvidia-utils
      - lib32-nvidia-utils
      - nvidia-settings
      - dkms
      - base-devel
      - linux-headers

  tasks:
    - name: Enable multilib repository
      ansible.builtin.replace:
        path: /etc/pacman.conf
        regexp: '^#\s*\[multilib\]\s*\n#\s*Include = /etc/pacman.d/mirrorlist'
        replace: "[multilib]\nInclude = /etc/pacman.d/mirrorlist"

    - name: Detect CPU vendor for microcode
      ansible.builtin.shell: grep -q "Intel" /proc/cpuinfo && echo "intel-ucode" || echo "amd-ucode"
      register: ucode_package
      changed_when: false

    - name: Update package databases
      ansible.builtin.command: pacman -Sy
      changed_when: true

    - name: Install microcode and NVIDIA driver packages
      community.general.pacman:
        name: "{{ [ucode_package.stdout] + nvidia_packages }}"
        state: present
        update_cache: false
        extra_args: --noconfirm

    - name: Ensure kms hook is in mkinitcpio.conf
      ansible.builtin.replace:
        path: /etc/mkinitcpio.conf
        regexp: '^HOOKS=\((?!.*kms)(.*)\)'
        replace: 'HOOKS=(\1 kms)'
      notify: Regenerate initramfs

    - name: Disable Early KMS (Fixes "Initial ramdisk" hang)
      ansible.builtin.lineinfile:
        path: /etc/mkinitcpio.conf
        regexp: '^MODULES=\('
        line: "MODULES=()"
      notify: Regenerate initramfs

    - name: Configure NVIDIA DRM and GSP firmware
      ansible.builtin.copy:
        dest: /etc/modprobe.d/nvidia.conf
        content: |
          # Enable DRM Kernel Mode Setting
          options nvidia-drm modeset=1
          # Enable fbdev for Wayland/Hyprland stability
          options nvidia-drm fbdev=1
          # Enable GSP firmware for Ampere (RTX 3080)
          options nvidia NVreg_EnableGpuFirmware=1
        mode: "0644"
      notify: Regenerate initramfs

    - name: Configure GRUB command line (Safe modeset)
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT="(?!.*nvidia-drm.modeset=1)(.*)"'
        replace: 'GRUB_CMDLINE_LINUX_DEFAULT="\1 nvidia-drm.modeset=1"'
      notify: Update GRUB

    - name: Create systemd DRI device dependency
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/99-systemd-dri-devices.rules
        content: |
          ACTION=="add", KERNEL=="card*", SUBSYSTEM=="drm", TAG+="systemd"
        mode: "0644"

    # CRITICAL: DO NOT DELETE. These profiles prevent VRAM stuttering and crashes in Hyprland.
    - name: Create NVIDIA application profiles directory
      ansible.builtin.file:
        path: /etc/nvidia/nvidia-application-profiles-rc.d
        state: directory
        mode: "0755"

    - name: Configure VRAM optimization for Hyprland
      ansible.builtin.copy:
        dest: /etc/nvidia/nvidia-application-profiles-rc.d/50-hyprland.json
        content: |
          {
              "rules": [
                  {
                      "pattern": {
                          "feature": "procname",
                          "matches": "Hyprland"
                      },
                      "profile": "Limit free buffer pool on Wayland compositors"
                  }
              ],
              "profiles": [
                  {
                      "name": "Limit free buffer pool on Wayland compositors",
                      "settings": [
                          {
                              "key": "GLVidHeapReuseRatio",
                              "value": 0
                          }
                      ]
                  }
              ]
          }
        mode: "0644"

  handlers:
    - name: Regenerate initramfs
      ansible.builtin.command:
        cmd: mkinitcpio -P
      changed_when: true

    - name: Update GRUB
      ansible.builtin.command:
        cmd: grub-mkconfig -o /boot/grub/grub.cfg
      changed_when: true
