---
- name: Install NVIDIA Drivers for RTX 3080 (Wayland/Hyprland)
  hosts: localhost
  become: true

  vars:
    nvidia_packages:
      - nvidia-open
      - nvidia-utils
      - lib32-nvidia-utils

  tasks:
    - name: Configure mkinitcpio with kms hook and NVIDIA modules
      ansible.builtin.lineinfile:
        path: /etc/mkinitcpio.conf
        regexp: '^HOOKS='
        line: 'HOOKS=(base udev autodetect microcode modconf kms block filesystems keyboard fsck)'
      notify: Regenerate initramfs

    - name: Add NVIDIA modules to mkinitcpio
      ansible.builtin.lineinfile:
        path: /etc/mkinitcpio.conf
        regexp: '^MODULES='
        line: 'MODULES=(nvidia nvidia_modeset nvidia_uvm nvidia_drm)'
      notify: Regenerate initramfs

    - name: Install NVIDIA driver packages with 32-bit support
      community.general.pacman:
        name: "{{ nvidia_packages }}"
        state: present
        update_cache: true
        extra_args: --noconfirm

    - name: Enable DRM kernel mode setting for Wayland
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet nvidia-drm.modeset=1 nvidia_drm.fbdev=0"'
      notify: Update GRUB

    - name: Create NVIDIA application profiles directory
      ansible.builtin.file:
        path: /etc/nvidia/nvidia-application-profiles-rc.d
        state: directory
        mode: '0755'

    - name: Configure VRAM optimization for Wayland compositors
      ansible.builtin.copy:
        dest: /etc/nvidia/nvidia-application-profiles-rc.d/50-limit-free-buffer-pool-in-wayland-compositors.json
        content: |
          {
              "rules": [
                  {
                      "pattern": {
                          "feature": "procname",
                          "matches": "Hyprland"
                      },
                      "profile": "Limit free buffer pool on Wayland compositors"
                  }
              ],
              "profiles": [
                  {
                      "name": "Limit free buffer pool on Wayland compositors",
                      "settings": [
                          {
                              "key": "GLVidHeapReuseRatio",
                              "value": 0
                          }
                      ]
                  }
              ]
          }
        mode: '0644'

  handlers:
    - name: Regenerate initramfs
      ansible.builtin.command:
        cmd: mkinitcpio -P
      changed_when: true

    - name: Update GRUB
      ansible.builtin.command:
        cmd: grub-mkconfig -o /boot/grub/grub.cfg
      changed_when: true
