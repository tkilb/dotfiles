---
- name: Install NVIDIA Drivers for RTX 3080 (Wayland/Hyprland)
  hosts: localhost
  become: true # Necessary to run with root privileges

  vars:
    nvidia_packages:
      - nvidia-open
      - nvidia-utils
      - lib32-nvidia-utils

  tasks:
    - name: Install NVIDIA driver packages with 32-bit support
      community.general.pacman:
        name: "{{ nvidia_packages }}"
        state: present
        update_cache: true

    - name: Enable DRM kernel mode setting for Wayland
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
        line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet nvidia-drm.modeset=1 nvidia-drm.fbdev=1"'
      notify: Update GRUB

    - name: Create NVIDIA application profiles directory
      ansible.builtin.file:
        path: /etc/nvidia/nvidia-application-profiles-rc.d
        state: directory
        mode: '0755'

    - name: Configure VRAM optimization for Wayland compositors
      ansible.builtin.copy:
        dest: /etc/nvidia/nvidia-application-profiles-rc.d/50-limit-free-buffer-pool-in-wayland-compositors.json
        content: |
          {
              "rules": [
                  {
                      "pattern": {
                          "feature": "procname",
                          "matches": "Hyprland"
                      },
                      "profile": "Limit free buffer pool on Wayland compositors"
                  },
                  {
                      "pattern": {
                          "feature": "procname",
                          "matches": "niri"
                      },
                      "profile": "Limit free buffer pool on Wayland compositors"
                  }
              ],
              "profiles": [
                  {
                      "name": "Limit free buffer pool on Wayland compositors",
                      "settings": [
                          {
                              "key": "GLVidHeapReuseRatio",
                              "value": 0
                          }
                      ]
                  }
              ]
          }
        mode: '0644'

    - name: Print post-reboot verification instructions
      ansible.builtin.debug:
        msg:
          - "After reboot, verify NVIDIA DRM is enabled:"
          - "  cat /sys/module/nvidia_drm/parameters/modeset  # Should return 'Y'"
          - "  cat /sys/module/nvidia_drm/parameters/fbdev   # Should return 'Y'"

  handlers:
    - name: Update GRUB
      ansible.builtin.command:
        cmd: grub-mkconfig -o /boot/grub/grub.cfg
      changed_when: true
