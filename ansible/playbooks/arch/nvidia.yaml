---
- name: Install NVIDIA Drivers and Wayland Support
  hosts: localhost
  become: true

  tasks:
    - name: Install NVIDIA Drivers
      community.general.pacman:
        name:
          - nvidia-open
          - nvidia-settings
          - nvidia-utils
          - lib32-nvidia-utils
        state: present
        update_cache: true

    - name: Install EGL Wayland Support
      community.general.pacman:
        name:
          - egl-wayland
        state: present
        update_cache: true

    - name: Install Vulkan Support
      community.general.pacman:
        name:
          - vulkan-headers
          - vulkan-tools
          - lib32-vulkan-icd-loader
        state: present
        update_cache: true

    - name: Create NVIDIA DRM Kernel Parameter Config
      ansible.builtin.copy:
        dest: /etc/modprobe.d/nvidia-drm.conf
        content: |
          options nvidia_drm modeset=1
        owner: root
        group: root
        mode: '0644'
      notify: Rebuild Initramfs

    - name: Add NVIDIA Modules to Initramfs
      ansible.builtin.shell:
        cmd: |
          if ! grep -q 'nvidia ' /etc/mkinitcpio.conf; then
            sed -i -E 's/^(MODULES=\()([^)]*)(\))$/\1\2 nvidia nvidia_modeset nvidia_uvm nvidia_drm\3/' /etc/mkinitcpio.conf
            echo "changed"
            exit 0
          fi
          exit 1
        warn: false
      register: add_mkinitcpio_modules
      changed_when: add_mkinitcpio_modules.stdout == "changed"
      notify: Rebuild Initramfs

    - name: Add NVIDIA DRM Kernel Parameter
      ansible.builtin.shell:
        cmd: |
          if ! grep -q 'nvidia-drm.modeset=1' /etc/default/grub; then
            sed -i -E 's/^(GRUB_CMDLINE_LINUX_DEFAULT=")(.*)(")$/\1\2 nvidia-drm.modeset=1\3/' /etc/default/grub
            echo "changed"
            exit 0
          fi
          exit 1
        warn: false
      register: add_grub_param
      changed_when: add_grub_param.stdout == "changed"
      notify:
        - Rebuild Initramfs
        - Update GRUB

    - name: Set NVIDIA Power Management to Preserve Video Memory
      ansible.builtin.lineinfile:
        path: /etc/modprobe.d/nvidia.conf
        regexp: '^options nvidia NVreg_PreserveVideoMemoryAllocations='
        line: 'options nvidia NVreg_PreserveVideoMemoryAllocations=1'
        create: true
      notify: Rebuild Initramfs

    - name: Enable NVIDIA Power Management Services
      ansible.builtin.command:
        cmd: systemctl enable --now nvidia-{{ item }}.service
      loop:
        - suspend
        - resume
        - hibernate
      changed_when: false
      failed_when: false

  handlers:
    - name: Rebuild Initramfs
      ansible.builtin.command:
        cmd: mkinitcpio -P
      changed_when: true
      listen: Rebuild Initramfs

    - name: Update GRUB
      ansible.builtin.command:
        cmd: grub-mkconfig -o /boot/grub/grub.cfg
      changed_when: true
      listen: Update GRUB
