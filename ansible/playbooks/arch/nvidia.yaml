---
- name: Install NVIDIA Drivers for RTX 3080 (Wayland/Hyprland)
  hosts: localhost
  become: true

  tasks:
    - name: Enable multilib repository in /etc/pacman.conf
      ansible.builtin.replace:
        path: /etc/pacman.conf
        regexp: '^#\[multilib\]\n#Include = /etc/pacman.d/mirrorlist'
        replace: "[multilib]\nInclude = /etc/pacman.d/mirrorlist"
      register: multilib_enabled

    - name: Update pacman cache if multilib was enabled
      community.general.pacman:
        update_cache: true
      when: multilib_enabled.changed

    - name: Install NVIDIA drivers and related packages
      community.general.pacman:
        name:
          - nvidia-dkms
          - nvidia-utils
          - lib32-nvidia-utils
          - nvidia-settings
          - linux-headers
          - base-devel
        state: present
        update_cache: true

    - name: Configure kernel parameters for NVIDIA DRM (GRUB)
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT=")((?:(?!nvidia-drm\.modeset=1).)*?)"'
        replace: '\1nvidia-drm.modeset=1 nvidia-drm.fbdev=1 \2"'
      notify: Update GRUB

    - name: Add NVIDIA modules for early loading in mkinitcpio
      ansible.builtin.replace:
        path: /etc/mkinitcpio.conf
        regexp: '^MODULES=\((.*?)\)'
        replace: 'MODULES=(\1 nvidia nvidia_modeset nvidia_uvm nvidia_drm)'
      notify: Regenerate initramfs

    - name: Remove "kms" from HOOKS in mkinitcpio to avoid conflicts
      ansible.builtin.replace:
        path: /etc/mkinitcpio.conf
        regexp: '(?<=\()(.+?\s)?kms(\s.+?|)(?=\))'
        replace: '\1\2'
      notify: Regenerate initramfs

    - name: Create /etc/pacman.d/hooks/ directory if it doesn't exist
      ansible.builtin.file:
        path: /etc/pacman.d/hooks
        state: directory
        mode: '0755'

    - name: Create pacman hook for NVIDIA initcpio regeneration
      ansible.builtin.copy:
        dest: /etc/pacman.d/hooks/nvidia.hook
        content: |
          [Trigger]
          Operation=Install
          Operation=Upgrade
          Operation=Remove
          Type=Package
          Target=nvidia
          Target=nvidia-dkms

          [Action]
          Description=Update Nvidia module in initcpio
          Depends=mkinitcpio
          When=PostTransaction
          Exec=/usr/bin/mkinitcpio -P
        mode: '0644'

    - name: Create NVIDIA modprobe configuration
      ansible.builtin.copy:
        dest: /etc/modprobe.d/nvidia.conf
        content: |
          options nvidia-drm modeset=1 fbdev=1
        mode: '0644'

    - name: Configure NVIDIA Environment Variables for Hyprland
      ansible.builtin.blockinfile:
        path: /etc/environment
        block: |
          LIBVA_DRIVER_NAME=nvidia
          XDG_SESSION_TYPE=wayland
          GBM_BACKEND=nvidia-drm
          __GLX_VENDOR_LIBRARY_NAME=nvidia
          WLR_NO_HARDWARE_CURSORS=1
        marker: "# {mark} ANSIBLE MANAGED NVIDIA ENVIRONMENT VARIABLES"

    - name: Inform user about completion and reboot
      ansible.builtin.debug:
        msg: "NVIDIA driver installation complete. Please reboot to apply changes."

  handlers:
    - name: Update GRUB
      ansible.builtin.command:
        cmd: grub-mkconfig -o /boot/grub/grub.cfg
      listen: Update GRUB

    - name: Regenerate initramfs
      ansible.builtin.command:
        cmd: mkinitcpio -P
      listen: Regenerate initramfs
