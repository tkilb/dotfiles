---
- name: Install and set Arch Linux console font
  hosts: localhost
  become: true
  tasks:
    - name: Install terminus-font and ttf-terminus-nerd packages
      community.general.pacman:
        name:
          - terminus-font
          - ttf-terminus-nerd
        state: present
        update_cache: true

    - name: Set console font in /etc/vconsole.conf
      ansible.builtin.lineinfile:
        path: /etc/vconsole.conf
        regexp: "^FONT="
        line: "FONT=ter-d32b.psf.gz"
        state: present
      notify: Reload vconsole.conf

    - name: Create /boot/grub/fonts directory
      ansible.builtin.file:
        path: /boot/grub/fonts
        state: directory
        mode: '0755'

    - name: Remove corrupt terminus fonts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /boot/grub/fonts/terminus_32.pf2
        - /boot/grub/fonts/terminus_64.pf2

    - name: Generate GRUB font (terminus_32.pf2)
      ansible.builtin.command: grub-mkfont -s 32 -o /boot/grub/fonts/terminus_32.pf2 /usr/share/fonts/TTF/TerminessNerdFont-Regular.ttf
      args:
        creates: /boot/grub/fonts/terminus_32.pf2

    - name: Generate GRUB font (terminus_64.pf2 - 2x larger)
      ansible.builtin.command: grub-mkfont -s 64 -o /boot/grub/fonts/terminus_64.pf2 /usr/share/fonts/TTF/TerminessNerdFont-Regular.ttf
      args:
        creates: /boot/grub/fonts/terminus_64.pf2

    - name: Set GRUB_FONT in /etc/default/grub
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_FONT='
        line: 'GRUB_FONT="/boot/grub/fonts/terminus_64.pf2"'
        state: present

    - name: Generate GRUB configuration
      ansible.builtin.command: grub-mkconfig -o /boot/grub/grub.cfg
      changed_when: false

