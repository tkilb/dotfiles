# HYPRLAND MODAL CONFIGURATION
# Designed for: Win=Ctrl mapping, No Super Key, No Caps Lock

# Monitors
monitor=,highres,auto,1

# Env Vars (Cursor & Dark Mode)
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = GTK_THEME,Adwaita-dark
env = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

# Execute essential apps
exec-once = waybar & swww init & dunst & /usr/lib/polkit-kde-authentication-agent-1 & nm-applet --indicator & blueman-applet

# Variables
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun

# Input: Physical Win -> Control
input {
    kb_layout = us
    kb_options = altwin:ctrl_win
    follow_mouse = 1
    touchpad { natural_scroll = no }
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration { rounding = 10; blur { enabled = true; size = 3; passes = 1 } }
animations { enabled = yes; bezier = myBezier, 0.05, 0.9, 0.1, 1.05; animation = windows, 1, 7, myBezier; animation = workspaces, 1, 6, default }

# --- THE MODAL SYSTEM (Leader Key) ---
# Press ALT + Space to enter System Mode
bind = ALT, Space, submap, system

submap = system
    # App Launchers (Exits submap automatically after launch)
    bind = , Q, exec, $terminal
    bind = , Q, submap, reset
    bind = , R, exec, $menu
    bind = , R, submap, reset
    bind = , E, exec, $fileManager
    bind = , E, submap, reset

    # Window Actions (Stays in submap for multiple actions)
    bind = , C, killactive
    bind = , V, togglefloating
    bind = , M, fullscreen, 1
    bind = , Space, fullscreen, 0

    # Navigation & Snapping (Stays in submap)
    bind = , Tab, cyclenext
    bind = , Tab, bringactivetotop
    bind = SHIFT, Tab, cyclenext, prev
    bind = SHIFT, Tab, bringactivetotop
    
    bind = , Left, movewindow, l
    bind = , Right, movewindow, r
    bind = SHIFT, Left, movewindow, mon:l
    bind = SHIFT, Right, movewindow, mon:r

    # Exit System Mode
    bind = , escape, submap, reset
    bind = , catchall, submap, reset
submap = reset

# --- GLOBAL CONVENIENCE SHORTCUTS ---
# These remain active always (may conflict with some apps)

# App Switching (Matches your GNOME preference)
# Warning: Will conflict with "Next Tab" in most browsers
bind = CTRL, Tab, cyclenext
bind = CTRL, Tab, bringactivetotop
bind = CTRL SHIFT, Tab, cyclenext, prev
bind = CTRL SHIFT, Tab, bringactivetotop

# Media Keys (Always active)
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Mouse dragging (ALT + Mouse)
bindm = ALT, mouse:272, movewindow
bindm = ALT, mouse:273, resizewindow
