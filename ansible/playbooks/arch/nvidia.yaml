---
- name: Install NVIDIA Drivers for RTX 3080 (Wayland/Hyprland)
  hosts: localhost
  become: true

  vars:
    # dkms version is safer as it works with any kernel (linux, lts, zen)
    nvidia_packages:
      - nvidia-dkms
      - nvidia-utils
      - lib32-nvidia-utils
      - nvidia-settings
      - dkms

  tasks:
    - name: Remove previous multilib block to prevent duplicates
      ansible.builtin.blockinfile:
        path: /etc/pacman.conf
        marker: "# {mark} ANSIBLE MANAGED MULTILIB"
        state: absent

    - name: Enable multilib repository by uncommenting
      ansible.builtin.replace:
        path: /etc/pacman.conf
        regexp: '^#\[multilib\]\n#Include = /etc/pacman.d/mirrorlist'
        replace: '[multilib]\nInclude = /etc/pacman.d/mirrorlist'

    - name: Detect CPU vendor for microcode
      ansible.builtin.shell: grep -q "Intel" /proc/cpuinfo && echo "intel-ucode" || echo "amd-ucode"
      register: ucode_package
      changed_when: false

    - name: Detect running kernel for headers
      ansible.builtin.shell: uname -r | sed 's/.*-\([a-z]*\)$//'
      register: kernel_suffix
      changed_when: false

    - name: Set kernel headers package name
      ansible.builtin.set_fact:
        headers_package: "linux-headers"
      when: kernel_suffix.stdout == ""

    - name: Set kernel headers package name for custom kernels
      ansible.builtin.set_fact:
        headers_package: "linux-{{ kernel_suffix.stdout }}-headers"
      when: kernel_suffix.stdout != ""

    - name: Force update pacman cache
      ansible.builtin.command: pacman -Sy
      changed_when: true

    - name: Install microcode, headers, and NVIDIA driver packages
      community.general.pacman:
        name: "{{ [ucode_package.stdout, headers_package] + nvidia_packages }}"
        state: present
        update_cache: false # We already ran pacman -Sy
        extra_args: --noconfirm

    - name: Ensure kms hook is in mkinitcpio.conf
      ansible.builtin.replace:
        path: /etc/mkinitcpio.conf
        regexp: '^HOOKS=\((?!.*kms)(.*)\)'
        replace: 'HOOKS=(\1 kms)'
      notify: Regenerate initramfs

    - name: Ensure microcode hook is in mkinitcpio.conf
      ansible.builtin.replace:
        path: /etc/mkinitcpio.conf
        regexp: '^HOOKS=\((?!.*microcode)(.*)\)'
        replace: 'HOOKS=(microcode \1)'
      notify: Regenerate initramfs

    - name: Add NVIDIA modules to mkinitcpio.conf
      ansible.builtin.lineinfile:
        path: /etc/mkinitcpio.conf
        regexp: '^MODULES=\('
        line: 'MODULES=(nvidia nvidia_modeset nvidia_uvm nvidia_drm)'
      notify: Regenerate initramfs

    - name: Configure NVIDIA DRM modeset and GSP firmware
      ansible.builtin.copy:
        dest: /etc/modprobe.d/nvidia.conf
        content: |
          # Enable DRM Kernel Mode Setting
          options nvidia-drm modeset=1
          # Enable GSP firmware for Ampere and later (RTX 3080)
          options nvidia NVreg_EnableGpuFirmware=1
        mode: '0644'
      notify: Regenerate initramfs

    - name: Configure GRUB command line for NVIDIA
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX_DEFAULT="(?!.*nvidia-drm.modeset=1)(.*)"'
        replace: 'GRUB_CMDLINE_LINUX_DEFAULT="\1 nvidia-drm.modeset=1"'
      notify: Update GRUB

    - name: Create systemd DRI device dependency for display manager
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/99-systemd-dri-devices.rules
        content: |
          ACTION=="add", KERNEL=="card*", SUBSYSTEM=="drm", TAG+="systemd"
        mode: '0644'

    - name: Create NVIDIA application profiles directory
      ansible.builtin.file:
        path: /etc/nvidia/nvidia-application-profiles-rc.d
        state: directory
        mode: '0755'

    - name: Configure VRAM optimization for Wayland compositors
      ansible.builtin.copy:
        dest: /etc/nvidia/nvidia-application-profiles-rc.d/50-limit-free-buffer-pool-in-wayland-compositors.json
        content: |
          {
              "rules": [
                  {
                      "pattern": {
                          "feature": "procname",
                          "matches": "Hyprland"
                      },
                      "profile": "Limit free buffer pool on Wayland compositors"
                  }
              ],
              "profiles": [
                  {
                      "name": "Limit free buffer pool on Wayland compositors",
                      "settings": [
                          {
                              "key": "GLVidHeapReuseRatio",
                              "value": 0
                          }
                      ]
                  }
              ]
          }
        mode: '0644'

  handlers:
    - name: Regenerate initramfs
      ansible.builtin.command:
        cmd: mkinitcpio -P
      changed_when: true

    - name: Update GRUB
      ansible.builtin.command:
        cmd: grub-mkconfig -o /boot/grub/grub.cfg
      changed_when: true
