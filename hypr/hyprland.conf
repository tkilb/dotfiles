# HYPRLAND CONFIGURATION
# Ported from GNOME preferences

# Monitors: https://wiki.hyprland.org/Configuring/Monitors/
monitor=,highres,auto,1

# Execute essential apps at launch
exec-once = waybar & swww init & dunst & /usr/lib/polkit-kde-authentication-agent-1 & nm-applet --indicator & blueman-applet

# Program shortcuts
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun

# Input configuration: This is where we make Meta act as Control
input {
    kb_layout = us
    kb_options = altwin:ctrl_win # This maps physical Win key to act as Control
    
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle # Dynamic tiling like GNOME snap but automatic
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = workspaces, 1, 6, default
}

# --- PORTED GNOME KEY PREFERENCES ---
# Since physical Win is now Ctrl, we use CTRL for app switching
# and ALT for window management (to avoid conflicts)

# Switch Applications: <Control>Tab (matches your gnome.yaml)
bind = CTRL, Tab, cyclenext
bind = CTRL, Tab, bringactivetotop
# Switch Backwards: <Shift><Control>Tab
bind = CTRL SHIFT, Tab, cyclenext, prev
bind = CTRL SHIFT, Tab, bringactivetotop

# Cycle Groups: <Control>grave (matches your gnome.yaml)
bind = CTRL, grave, cyclenext
bind = CTRL, grave, bringactivetotop

# Snap to Left: <Control><Alt>Left
bind = CTRL ALT, Left, movewindow, l
# Snap to Right: <Control><Alt>Right
bind = CTRL ALT, Right, movewindow, r

# Maximize Window: <Control><Alt>M
bind = CTRL ALT, M, fullscreen, 1

# Move to monitor left/right: <Shift><Control><Alt>Left/Right
bind = CTRL ALT SHIFT, Left, movewindow, mon:l
bind = CTRL ALT SHIFT, Right, movewindow, mon:r

# --- STANDARD WM ACTIONS (Using ALT as main mod) ---
$mainMod = ALT

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive, 
bind = $mainMod, R, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating, 
bind = $mainMod, Space, fullscreen, 0 # Toggle true fullscreen

# Mouse bindings for moving/resizing
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume/Brightness (Standard laptop keys)
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
