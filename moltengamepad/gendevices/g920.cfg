["Logitech G920 Driving Force Racing Wheel"]
name = "g920"
devname = "g920"
exclusive = "true"
change_permissions = "true"
flatten = "false"
rumble = "true"
device_type = "wheel"
gamepad_subscription = true

# Steering wheel axis 
abs_x = "abs_x", "Steering wheel rotation axis"

# D-pad
abs_hat0x = "dpad_x", "D-pad horizontal"
abs_hat0y = "dpad_y", "D-pad vertical"

# Buttons
key(288) = "a", "A button"
key(289) = "b", "B button"
key(290) = "x", "X button"
key(291) = "y", "Y button"

key(292) = "lb", "Left bumper"
key(293) = "rb", "Right bumper"

key(294) = "start", "Menu/Start button"
key(295) = "select", "View/Back button"

key(296) = "lsb", "Left stick button"
key(297) = "rsb", "Right stick button"

key(298) = "guide", "Xbox/Guide button"

# Paddle shifters
key(704) = "paddle_left", "Left paddle"
key(705) = "paddle_right", "Right paddle"

# Aliases for profile compatibility
alias first a
alias second b
alias third x
alias fourth y
alias start start
alias select back
alias dpad_x left
alias dpad_y up
