include ./themes/gruvbox-hard-dark.conf

# Font configuration with Nerd Font fallback
font_family      FiraCode Nerd Font Mono
bold_font        FiraCode Nerd Font Mono Bold
italic_font      FiraCode Nerd Font Mono Bold Italic
symbol_map U+23FB-U+23FE,U+E0A0-U+E0A3,U+E0B0-U+E0B3 Symbols Nerd Font Mono

# Map Ctrl+V to paste from clipboard
map ctrl+v paste_from_clipboard

# Map Ctrl+C and Cmd+C to copy to clipboard, or send interrupt if no selection
map ctrl+c copy_or_interrupt
map cmd+c copy_or_interrupt

# Map Ctrl+- to zoom out and Ctrl++ to zoom in
map ctrl+minus change_font_size all -2.0
map ctrl+plus change_font_size all +2.0
map ctrl+0 change_font_size all 0

# Pass ctrl+. through to tmux/terminal applications
map ctrl+. send_text all \x1b[46;5u

# Pass Alt/Option keys through to terminal (macOS)
macos_option_as_alt yes

# Pass Alt+M through to tmux
map alt+m send_text all \x1bm

